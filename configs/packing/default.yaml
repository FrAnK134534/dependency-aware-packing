input_path: data/examples/code_docs.jsonl
output_path: outputs/example_dependency_aware.jsonl
method: dependency_aware
max_tokens: 512
seed: 42
min_dependency_score: 0.11
min_similarity_score: 0.01
candidate_pool_size: 80
redundancy_threshold: 0.72

dependency_weights:
  import_relation: 1.0
  test_source_relation: 0.9
  readme_code_relation: 0.6
  docs_code_relation: 0.6
  config_script_relation: 0.5
  example_code_relation: 0.5
  same_directory: 0.25
  same_repo: 0.1
